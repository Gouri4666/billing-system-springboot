<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Billing System - Bill History</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
    display: flex;
    color: #333;
}
.sidebar {
    width: 250px;
    background: #1e293b;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
    box-shadow: 4px 0 10px rgba(0,0,0,0.1);
    z-index: 1000;
}
.sidebar h2 {
    color: #fff;
    text-align: center;
    margin-bottom: 30px;
    font-size: 22px;
    font-weight: 600;
}
.nav-link {
    color: #cbd5e1;
    text-decoration: none;
    padding: 15px 25px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.3s ease;
}
.nav-link:hover, .nav-link.active {
    background: #3b82f6;
    color: #fff;
    border-left: 5px solid #60a5fa;
}
.main-content {
    margin-left: 250px;
    flex: 1;
    padding: 30px;
    min-height: 100vh;
}
.container {
    width: 100%;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 20px;
    border-radius: 8px;
    overflow: hidden;
}
th {
    background: #f8fafc;
    color: #475569;
    padding: 15px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid #e2e8f0;
}
td {
    padding: 15px;
    border-bottom: 1px solid #f1f5f9;
    color: #475569;
}
tr:hover td {
    background: #f8fafc;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Billing System</h2>
    <a href="/products" class="nav-link">📦 Products</a>
    <a href="/billing" class="nav-link">💳 Billing</a>
    <a href="/billHistory" class="nav-link active">📜 History</a>
</div>

<div class="main-content">
<div class="container">

<h2>Bill History</h2>

<table>

<thead>
<tr>
<th>Bill ID</th>
<th>Total (Rs.)</th>
<th>Date</th>
</tr>
</thead>

<tbody>

<tr th:each="b : ${bills}">

<td th:text="${b.id}"></td>

<td th:text="${b.total}"></td>

<td th:text="${#temporals.format(b.billDate,'yyyy-MM-dd')}"></td>

</tr>

</tbody>

</table>

</div>
</div>
</body>
</html>
