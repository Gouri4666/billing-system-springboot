<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Billing System - Generate Bill</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
    display: flex;
    color: #333;
}
.sidebar {
    width: 250px;
    background: #1e293b;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
    box-shadow: 4px 0 10px rgba(0,0,0,0.1);
    z-index: 1000;
}
.sidebar h2 {
    color: #fff;
    text-align: center;
    margin-bottom: 30px;
    font-size: 22px;
    font-weight: 600;
}
.nav-link {
    color: #cbd5e1;
    text-decoration: none;
    padding: 15px 25px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.3s ease;
}
.nav-link:hover, .nav-link.active {
    background: #3b82f6;
    color: #fff;
    border-left: 5px solid #60a5fa;
}
.main-content {
    margin-left: 250px;
    flex: 1;
    padding: 30px;
    min-height: 100vh;
}
.container {
    width: 100%;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 20px;
    border-radius: 8px;
    overflow: hidden;
}
th {
    background: #f8fafc;
    color: #475569;
    padding: 15px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid #e2e8f0;
}
td {
    padding: 15px;
    border-bottom: 1px solid #f1f5f9;
    color: #475569;
}
.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
}
.add-btn { background: #3b82f6; color: white; display: inline-flex; align-items: center;}
.add-btn:hover { background: #2563eb; }
.remove-btn { background: #ef4444; color: white; }
.remove-btn:hover { background: #dc2626; }
.save-btn { background: #10b981; color: white; width: 100%; margin-top: 20px; padding: 12px; font-size: 16px; font-weight: 600;}
.save-btn:hover { background: #059669; }
.print-btn { background: #6366f1; color: white; width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; font-weight: 600;}
.print-btn:hover { background: #4f46e5; }
.form-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
select, input[type="number"] {
    padding: 10px 15px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
}
select:focus, input:focus { border-color: #3b82f6; }
.total-section { text-align: right; margin-top: 30px; font-size: 24px; font-weight: 600; padding-top: 20px; border-top: 2px dashed #cbd5e1; }
@media print {
    body { background: white; }
    .no-print, .sidebar { display: none !important; }
    .main-content { margin-left: 0; padding: 0; }
    .container { width: 100%; box-shadow: none; margin: 0; padding: 0; border: none; }
}
</style>
</head>
<body>

<div class="sidebar no-print">
    <h2>Billing System</h2>
    <a href="/products" class="nav-link">📦 Products</a>
    <a href="/billing" class="nav-link active">💳 Billing</a>
    <a href="/billHistory" class="nav-link">📜 History</a>
</div>

<div class="main-content">
<div class="container">

<!-- ADD ITEMS -->

<div class="no-print" style="margin-bottom:30px;padding:15px;background:#e3f2fd;border-radius:4px;">

<h3>Add Items to Bill</h3>

<div class="form-group">

<select id="productSelect">

<option value="" disabled selected>Select a Product</option>

<option
th:each="p : ${products}"
th:value="${p.price}"
th:text="${p.name + ' - Rs. ' + p.price}"
th:data-name="${p.name}">
</option>

</select>

<input
type="number"
id="quantityInput"
placeholder="Quantity"
min="1"
value="1"
style="width:80px">

<button class="btn add-btn" onclick="addToCart()">Add to Bill</button>

</div>

</div>

<h2>Billing Summary</h2>

<table id="billTable">

<thead>
<tr>
<th>Item Name</th>
<th>Price (Rs.)</th>
<th>Quantity</th>
<th>Subtotal (Rs.)</th>
<th class="no-print">Action</th>
</tr>
</thead>

<tbody id="cartBody">
</tbody>

</table>

<div class="total-section">
Grand Total : Rs. <span id="grandTotal">0.00</span>
</div>

<button class="btn save-btn no-print" onclick="saveBill()">
Save Bill
</button>

<button class="btn print-btn no-print" onclick="window.print()">
Print Bill
</button>

</div>

<script>

let grandTotal = 0;

function addToCart(){

const select=document.getElementById("productSelect");
const quantityInput=document.getElementById("quantityInput");

if(select.selectedIndex===0 || quantityInput.value<=0){
alert("Please select a product and valid quantity.");
return;
}

const option=select.options[select.selectedIndex];

const name=option.getAttribute("data-name");
const price=parseFloat(option.value);
const quantity=parseInt(quantityInput.value);
const subtotal=price*quantity;

const tbody=document.getElementById("cartBody");

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${name}</td>
<td>${price.toFixed(2)}</td>
<td>${quantity}</td>
<td>${subtotal.toFixed(2)}</td>
<td class="no-print">
<button class="btn remove-btn"
onclick="removeItem(this,${subtotal})">
Remove
</button>
</td>
`;

tbody.appendChild(tr);

grandTotal+=subtotal;

updateTotal();

select.selectedIndex=0;
quantityInput.value=1;

}

function removeItem(button,subtotal){

const tr=button.parentElement.parentElement;

tr.remove();

grandTotal-=subtotal;

updateTotal();

}

function updateTotal(){

document.getElementById("grandTotal").innerText=
grandTotal.toFixed(2);

}

function saveBill(){

if(grandTotal<=0){
alert("No items in bill!");
return;
}

fetch("/saveBill",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"total="+grandTotal
})
.then(response=>response.text())
.then(data=>{
alert("Bill saved successfully!");
})
.catch(error=>{
alert("Error saving bill");
});

}

</script>
</div>
</div>
</body>
</html>
