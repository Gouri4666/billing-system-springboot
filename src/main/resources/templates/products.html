<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Billing System - Products</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

/* NAVBAR */

.navbar{
background:#1e73e8;
color:white;
padding:15px;
font-size:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links{
display:flex;
gap:10px;
}

.nav-link{
color:white;
text-decoration:none;
background:#0d47a1;
padding:8px 12px;
border-radius:4px;
}

/* CONTAINER */

.container{
width:80%;
margin:auto;
background:white;
padding:25px;
margin-top:25px;
border-radius:8px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#2c2c2c;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th:last-child,
td:last-child{
text-align:center;
}

/* BUTTONS */

.btn{
padding:6px 14px;
border:none;
border-radius:4px;
cursor:pointer;
font-size:14px;
}

.add-btn{
background:#1abc9c;
color:white;
}

.delete-btn{
background:#ff4d4d;
color:white;
margin-left:5px;
}

.edit-btn{
background:#f39c12;
color:white;
}

/* INPUTS */

input{
padding:8px;
border:1px solid #ccc;
border-radius:4px;
margin-right:10px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
margin:10% auto;
padding:20px;
width:400px;
border-radius:6px;
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

.update-btn{
background:#3498db;
color:white;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<span>Billing System</span>

<div class="nav-links">

<a href="/billing" class="nav-link">Billing</a>
<a href="/products" class="nav-link">Products</a>
<a href="/billHistory" class="nav-link">Billing History</a>

</div>

</div>

<div class="container">

<h2>Products</h2>

<!-- ADD PRODUCT -->

<form th:action="@{/addProduct}" method="post">

<input type="text" name="name" placeholder="Product Name" required>

<input type="number" step="0.01" name="price" placeholder="Price" required>

<button class="btn add-btn">Add Product</button>

</form>

<!-- PRODUCT TABLE -->

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="p : ${products}">

<td th:text="${p.id}"></td>
<td th:text="${p.name}"></td>
<td th:text="${p.price}"></td>

<td>

<button class="btn edit-btn"
th:attr="onclick=|openEditModal('${p.id}','${p.name}','${p.price}')|">
Edit
</button>

<a th:href="@{/delete/{id}(id=${p.id})}">
<button type="button" class="btn delete-btn">Delete</button>
</a>

</td>

</tr>

</tbody>

</table>

</div>

<!-- EDIT PRODUCT POPUP -->

<div id="editModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h3>Edit Product</h3>

<form th:action="@{/updateProduct}" method="post">

<input type="hidden" id="editId" name="id">

<label>Product Name</label>
<input type="text" id="editName" name="name" required>

<label>Price</label>
<input type="number" step="0.01" id="editPrice" name="price" required>

<button class="btn update-btn">Update Product</button>

</form>

</div>

</div>

<script>

function openEditModal(id,name,price){

document.getElementById("editModal").style.display="block";

document.getElementById("editId").value=id;
document.getElementById("editName").value=name;
document.getElementById("editPrice").value=price;

}

function closeModal(){
document.getElementById("editModal").style.display="none";
}

window.onclick=function(event){

let modal=document.getElementById("editModal");

if(event.target==modal){
modal.style.display="none";
}

}

</script>

</body>
</html>
