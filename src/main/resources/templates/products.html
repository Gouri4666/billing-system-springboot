<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Billing System - Products</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
    display: flex;
    color: #333;
}
.sidebar {
    width: 250px;
    background: #1e293b;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
    box-shadow: 4px 0 10px rgba(0,0,0,0.1);
    z-index: 1000;
}
.sidebar h2 {
    color: #fff;
    text-align: center;
    margin-bottom: 30px;
    font-size: 22px;
    font-weight: 600;
}
.nav-link {
    color: #cbd5e1;
    text-decoration: none;
    padding: 15px 25px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.3s ease;
}
.nav-link:hover, .nav-link.active {
    background: #3b82f6;
    color: #fff;
    border-left: 5px solid #60a5fa;
}
.main-content {
    margin-left: 250px;
    flex: 1;
    padding: 30px;
    min-height: 100vh;
}
.container {
    width: 100%;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 20px;
    border-radius: 8px;
    overflow: hidden;
}
th {
    background: #f8fafc;
    color: #475569;
    padding: 15px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid #e2e8f0;
}
td {
    padding: 15px;
    border-bottom: 1px solid #f1f5f9;
    color: #475569;
}
tr:hover td {
    background: #f8fafc;
}
th:last-child, td:last-child {
    text-align: center;
}
.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
}
.add-btn { background: #3b82f6; color: white; display: inline-flex; align-items: center;}
.add-btn:hover { background: #2563eb; }
.delete-btn { background: #ef4444; color: white; margin-left: 5px; }
.delete-btn:hover { background: #dc2626; }
.edit-btn { background: #f59e0b; color: white; }
.edit-btn:hover { background: #d97706; }
input {
    padding: 10px 15px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    margin-right: 10px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
}
input:focus { border-color: #3b82f6; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1050;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
}
.modal-content {
    background: white;
    margin: 10% auto;
    padding: 30px;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    position: relative;
    animation: modalFadeIn 0.3s ease;
}
@keyframes modalFadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
.close {
    position: absolute;
    right: 20px;
    top: 20px;
    font-size: 24px;
    cursor: pointer;
    color: #94a3b8;
    transition: color 0.2s;
}
.close:hover { color: #333; }
.update-btn { background: #3b82f6; color: white; width: 100%; margin-top: 15px; }
.update-btn:hover { background: #2563eb; }
.modal-content label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: 500; color: #475569; }
.modal-content input { width: box-sizing; width: 100%; margin-right: 0; margin-bottom: 10px; box-sizing: border-box;}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Billing System</h2>
    <a href="/products" class="nav-link active">📦 Products</a>
    <a href="/billing" class="nav-link">💳 Billing</a>
    <a href="/billHistory" class="nav-link">📜 History</a>
</div>

<div class="main-content">
<div class="container">

<h2>Products</h2>

<!-- ADD PRODUCT -->

<form th:action="@{/addProduct}" method="post">

<input type="text" name="name" placeholder="Product Name" required>

<input type="number" step="0.01" name="price" placeholder="Price" required>

<button class="btn add-btn">Add Product</button>

</form>

<!-- PRODUCT TABLE -->

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="p : ${products}">

<td th:text="${p.id}"></td>
<td th:text="${p.name}"></td>
<td th:text="${p.price}"></td>

<td>

<button class="btn edit-btn"
th:attr="onclick=|openEditModal('${p.id}','${p.name}','${p.price}')|">
Edit
</button>

<a th:href="@{/delete/{id}(id=${p.id})}">
<button type="button" class="btn delete-btn">Delete</button>
</a>

</td>

</tr>

</tbody>

</table>

</div>

<!-- EDIT PRODUCT POPUP -->

<div id="editModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h3>Edit Product</h3>

<form th:action="@{/updateProduct}" method="post">

<input type="hidden" id="editId" name="id">

<label>Product Name</label>
<input type="text" id="editName" name="name" required>

<label>Price</label>
<input type="number" step="0.01" id="editPrice" name="price" required>

<button class="btn update-btn">Update Product</button>

</form>

</div>

</div>

<script>

function openEditModal(id,name,price){

document.getElementById("editModal").style.display="block";

document.getElementById("editId").value=id;
document.getElementById("editName").value=name;
document.getElementById("editPrice").value=price;

}

function closeModal(){
document.getElementById("editModal").style.display="none";
}

window.onclick=function(event){

let modal=document.getElementById("editModal");

if(event.target==modal){
modal.style.display="none";
}

}

</script>
</div>
</div>
</body>
</html>
